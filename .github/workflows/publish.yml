name: publish

# Publishes to PyPI via trusted publishing (OIDC — no stored token) when a
# GitHub release is published. One-time setup on pypi.org: add a pending
# trusted publisher for project "a2acast" → owner "husker", repo "a2acast",
# workflow "publish.yml", environment "pypi".
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: release tag must match mesh.py VERSION
        run: |
          python3 - <<'EOF'
          import os, re, sys
          v = re.search(r'^VERSION = "([^"]+)"',
                        open("mesh.py").read(), re.M).group(1)
          tag = os.environ.get("GITHUB_REF_NAME", "")
          if tag != "v" + v:
              sys.exit("release tag %r != v%s from mesh.py" % (tag, v))
          print("tag matches:", tag)
          EOF
      - run: python -m pip install build && python -m build
      - uses: pypa/gh-action-pypi-publish@release/v1
